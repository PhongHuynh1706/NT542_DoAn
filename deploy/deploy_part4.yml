---
- name: Deploy local nginx mTLS reverse proxy
  hosts: local
  become: yes
  vars_files:
    - ../vars/cert_path.yml
  
  tasks:
    - name: Install nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Enable and start nginx
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Remove default nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Create nginx snippets directory
      file:
        path: /etc/nginx/snippets
        state: directory
        mode: '0755'
    
    - name: Deploy SSL snippet
      template:
        src: ../templates/snippets/ssl.conf.j2
        dest: /etc/nginx/snippets/ssl.conf
        mode: '0644'

    - name: Deploy security snippet
      template:
        src: ../templates/snippets/security.conf.j2
        dest: /etc/nginx/snippets/security.conf

    - name: Deploy proxy mtls snippet
      template:
        src: ../templates/snippets/proxy_mtls.conf.j2
        dest: /etc/nginx/snippets/proxy_mtls.conf

    - name: Deploy nginx configs
      template:
        src: ../templates/http_redirect_80.j2
        dest: /etc/nginx/conf.d/http.conf

    - name: Deploy frontend
      template:
        src: ../templates/https_frontend_443.j2
        dest: /etc/nginx/conf.d/https.conf

    - name: Deploy backend
      template:
        src: ../templates/backend_mtls_8443.j2
        dest: /etc/nginx/conf.d/backend.conf

    - name: Deploy nginx configs
      template:
        src: ../templates/global_nginx.j2
        dest: /etc/nginx/nginx.conf

    - name: Validate nginx config
      command: nginx -t
      register: nginx_test
      changed_when: false
      failed_when: nginx_test.rc != 0

    - name: Reload nginx
      service:
        name: nginx
        state: reloaded
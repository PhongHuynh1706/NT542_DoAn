---
- name: Deploy local nginx mTLS reverse proxy
  hosts: local
  become: yes
  vars_files:
    - cert_path.yml
  tasks:

    - name: Install nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Enable and start nginx
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Remove default nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Deploy nginx mTLS config
      template:
        src: templates/part4.j2
        dest: /etc/nginx/conf.d/part4.conf
        owner: root
        group: root
        mode: '0644'

    - name: Validate nginx config
      command: nginx -t
      register: nginx_test
      changed_when: false
      failed_when: nginx_test.rc != 0

    - name: Reload nginx
      service:
        name: nginx
        state: reloaded